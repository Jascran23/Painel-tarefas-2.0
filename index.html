<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://kit.fontawesome.com/523b4ebef2.js" crossorigin="anonymous"></script>
    <title>MyList</title>
</head>
<body>
    <aside>
        <header>
            <h3 id="name-project">MyTasks</h3>
            <p>Produtividade</p>
        </header>
        <nav>
            <ul id="menu">
                <li id="menu-all" class="menu-nav active"><i class="fa-regular fa-circle-check"></i> Todos</li>
                <li id="menu-category" class="menu-nav"><i class="fa-solid fa-layer-group"></i> Categorias</li>
                
            </ul>
        </nav>
        <button id="btn-add-task">+ Add Tarefa</button>
    </aside>

    <main>
        <!-- menu barra -->
        <header>
            <div id="search">
                <div id="icon-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <input id="input-search" placeholder="Buscar tarefa ..." type="text">
            </div>

            <div id="header-icons">
                <div id="icon-notification" class="header-icon"><i class="fa-solid fa-bell"></i></div>
                <div id="icon-config" class="header-icon"><i class="fa-solid fa-gear"></i></div>
                <div id="icon-user" class="header-icon"><i class="fa-solid fa-user"></i></div>
            </div>
        </header>

        <!-- conteudo -->
        <div class="container">
            <div id="container-title">
            <h1>Minhas Tarefas</h1>
            <p id="description-title"></p>
            </div>
        <div id="table-tasks">
            <table>
                <thead>
                    <tr id="table-header">
                        <th class="table-th" id="table-name">Descrição</th>
                        <th >Categoria</th>
                        <th >Data</th>
                        <th id="table-action">Ações</th>
                    </tr>
                </thead>
              <tbody id="container-tasks">
                
              </tbody>
            </table>
        </div>
        </div>
       
    </main>
    <div id="container-modal" class="container-modal">
            <div id="modal-task">
                <header>
                    <div>
                        <h2>Inserir Tarefas</h2>
                        <p>Aprimore suas intenções e detalhes.</p>
                    </div>
                    <div>
                        <i id="modal-button-esc" class="fa-solid fa-x"></i>
                    </div>               
                </header>
                <div id="container-modal-form">
                    <form>
                        <div id="modal-box-description">
                            <p class="description-modal">DESCRIÇÃO DA TAREFA</p>
                            <input id="title-task-modal" placeholder="Descrição" type="text" required>
                            <p class="error"></p>
                        </div>
                        <div>
                            <p class="description-modal">CATEGORIA</p>
                            <!-- <select name="category" id="select-category-modal">
                            <option value="pessoal" >Pessoal</option>
                            <option value="trabalho">Trabalho</option>
                            
                            </select> -->
                            
                            <ul id="modal-select-category">
                                
                            </ul>
                            <p class="error"></p>
                        </div>
                        <div id="container-details">
                            <p class="description-modal">DESCRIÇÃO</p>
                            <textarea name="details" id="details-form" required></textarea>
                            <p class="error"></p>
                        </div>
                        <div id="modal-button-task">
                            <button class="button-modal" id="button-cancel-task">Cancelar</button>
                            <button class="button-modal" id="button-save-task">Salvar Tarefa</button>
                            <button class="none button-modal" id="button-edit-task">Editar Tarefa</button>
                        </div>
                    </form>
                    
                </div>
            </div>
            
    </div>
    
    <script src="./js/main.js"></script>
</body>
</html>
