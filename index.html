<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>MyList</title>
</head>
<body>
    <aside>
        <header>
            <h3 id="name-project">MyTasks</h3>
            <p>Produtividade</p>
        </header>
        <nav>
            <ul id="menu">
                <li>Todos</li>
            </ul>
        </nav>
        <button id="add-task">+ Add Tarefa</button>
    </aside>

    <main>
        <header>
            <div id="search">
                <div id="icon-search"></div>
                <input id="input-search" type="text">
            </div>

            <div id="header-icons">
                <div id="icon-notification" class="header-icon"></div>
                <div id="icon-config" class="header-icon"></div>
                <div id="icon-perfil" class="header-icon"></div>
            </div>
        </header>
        <div id="title-my-tasks">
            <h1>Minhas Tarefas</h1>
            <p id="description-title"></p>
        </div>

        <div id="table-tasks">
            <table>
                <tr>
                    <th>Nome Tarefa</th>
                    <th>Categoria</th>
                    <th>Data</th>
                    <th>Ações</th>
                </tr>
                <tr>
                    <td>Fazer tarefa</td>
                </tr>
                <tr>
                    <td>12/12/12</td>
                </tr>
                <tr>
                    <td>Icone</td>
                </tr>
                
            </table>
        </div>
    </main>
</body>
</html>
